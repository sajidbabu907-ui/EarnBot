<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Bot</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#F5F7FB] font-sans text-gray-800 pb-20">

    <!-- Top Header Profile -->
    <div class="bg-[#5856D6] text-white p-5 rounded-b-[35px] flex items-center justify-between shadow-md">
        <div class="flex items-center gap-3">
            <img id="user-photo" src="https://via.placeholder.com/50" class="w-12 h-12 rounded-full border-2 border-white object-cover" alt="Profile">
            <div>
                <h2 id="user-name" class="font-bold text-lg text-white">Sazzad</h2>
                <p id="user-id" class="text-xs text-purple-200">ID: 7624549942</p>
            </div>
        </div>
        <button class="bg-purple-600/50 p-2 rounded-full text-white">🎧</button>
    </div>

    <!-- Total Balance Card -->
    <div class="mx-5 -mt-6 bg-white rounded-3xl p-6 shadow-lg border border-purple-100 text-center relative z-10">
        <p class="text-xs font-semibold text-gray-400 tracking-wider uppercase mb-1">Total Balance</p>
        <h1 class="text-5xl font-black text-[#22215B] flex justify-center items-baseline gap-1">
            <span id="balance">52.50</span> <span class="text-orange-400 text-lg font-bold">TK</span>
        </h1>
        
        <div class="w-full border-t border-dashed border-gray-200 my-4"></div>
        
        <div class="flex justify-between px-4">
            <div class="text-left">
                <span id="earned" class="block font-bold text-gray-700 text-lg">52.50</span>
                <span class="text-xs text-gray-400 font-medium">Earned</span>
            </div>
            <div class="text-right">
                <span id="referrals" class="block font-bold text-gray-700 text-lg">0</span>
                <span class="text-xs text-gray-400 font-medium">Referrals</span>
            </div>
        </div>
    </div>

    <!-- Daily Rewards Section -->
    <div class="mx-5 mt-6">
        <h3 class="flex items-center gap-2 font-bold text-gray-800 text-lg mb-3">🎁 Daily Rewards</h3>
        <button id="daily-bonus-btn" class="w-full bg-[#00C6AD] hover:bg-[#00B39C] text-white font-bold py-4 rounded-2xl shadow-md transition flex justify-center items-center gap-2 text-md">
            <span>📦</span> Open Daily Bonus
        </button>
    </div>

    <!-- Daily Ads Section -->
    <div class="mx-5 mt-6 mb-10">
        <h3 class="flex items-center gap-2 font-bold text-gray-800 text-lg mb-3">▶️ Daily Ads</h3>
        
        <div class="grid grid-cols-2 gap-4">
            <!-- Ad Slot 1 -->
            <div onclick="watchAd(1, 0.5)" class="bg-[#FFF4E6] border border-orange-200 rounded-2xl p-4 text-center cursor-pointer shadow-sm active:scale-95 transition">
                <span class="text-2xl block mb-1">▶️</span>
                <h4 class="font-bold text-gray-800 text-sm">Ad Slot 1</h4>
                <span class="inline-block bg-white text-xs text-orange-500 font-bold px-2 py-1 rounded-full my-2">+0.5 TK</span>
                <p class="text-[10px] text-gray-400">0/10000 Watched</p>
            </div>
            <!-- Ad Slot 2 -->
            <div onclick="watchAd(2, 0.5)" class="bg-[#E6F0FF] border border-blue-200 rounded-2xl p-4 text-center cursor-pointer shadow-sm active:scale-95 transition">
                <span class="text-2xl block mb-1">🔵</span>
                <h4 class="font-bold text-gray-800 text-sm">Ad Slot 2</h4>
                <span class="inline-block bg-white text-xs text-blue-500 font-bold px-2 py-1 rounded-full my-2">+0.5 TK</span>
                <p class="text-[10px] text-gray-400">0/10000 Watched</p>
            </div>
            <!-- Ad Slot 3 -->
            <div onclick="watchAd(3, 0.5)" class="bg-[#E6FFE6] border border-green-200 rounded-2xl p-4 text-center cursor-pointer shadow-sm active:scale-95 transition">
                <span class="text-2xl block mb-1">⚡</span>
                <h4 class="font-bold text-gray-800 text-sm">Ad Slot 3</h4>
                <span class="inline-block bg-white text-xs text-green-500 font-bold px-2 py-1 rounded-full my-2">+0.5 TK</span>
                <p class="text-[10px] text-gray-400">0/10000 Watched</p>
            </div>
            <!-- Ad Slot 4 -->
            <div onclick="watchAd(4, 0.5)" class="bg-[#FFE6F0] border border-pink-200 rounded-2xl p-4 text-center cursor-pointer shadow-sm active:scale-95 transition">
                <span class="text-2xl block mb-1">💎</span>
                <h4 class="font-bold text-gray-800 text-sm">Ad Slot 4</h4>
                <span class="inline-block bg-white text-xs text-pink-500 font-bold px-2 py-1 rounded-full my-2">+0.5 TK</span>
                <p class="text-[10px] text-gray-400">0/10000 Watched</p>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation Bar -->
    <div class="fixed bottom-0 left-0 right-0 bg-[#22252A] text-gray-400 p-3 flex justify-around items-center rounded-t-3xl shadow-xl z-50">
        <button class="flex flex-col items-center text-white"><span class="text-xl">🏠</span></button>
        <button class="flex flex-col items-center"><span class="text-xl">👥</span></button>
        <button class="flex flex-col items-center"><span class="text-xl">🏆</span></button>
        <button class="flex flex-col items-center"><span class="text-xl">💼</span></button>
    </div>

    <script src="app.js"></script>
</body>
</html>
